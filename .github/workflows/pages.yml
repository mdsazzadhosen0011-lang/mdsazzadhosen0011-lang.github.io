name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A626D9: ${{ secrets.A626D9 }}
          BA8A6B: ${{ secrets.BA8A6B }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A626D9', '')
          sec_b = os.environ.get('BA8A6B', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 66a172fc57ad9f6c58b9c8c6ac94 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- fa02e2f9c4ccda6455ee630a5cfa294c -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
